name: Deploy to Cloudflare Workers

# Every push to main that touches application code triggers a
# Cloudflare Workers deploy. Docs-only commits skip via paths-ignore.
# Manual runs available from the Actions tab via workflow_dispatch.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN          — Workers Scripts:Edit scope
#   CLOUDFLARE_ACCOUNT_ID         — also visible in `npx wrangler whoami`
#   NEXT_PUBLIC_SUPABASE_URL      — inlined into Next bundle + CSP at build
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — inlined into Next bundle at build
#   SUPABASE_SERVICE_ROLE_KEY     — required at build (admin route modules
#                                   import supabaseAdmin at module-eval
#                                   time during page-data collection) AND
#                                   at runtime on the Worker
#                                   (`wrangler secret put`)
#
# Runtime-only Worker secrets (NOT needed in this workflow):
#   JIRA_API_TOKEN, CQIP_SYNC_AUTH_KEY, CQIP_BRANDS_API_TOKEN,
#   CQIP_DROUGHT_AUTH_KEY — set via `wrangler secret put`.

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Post-deploy smoke check
        run: |
          sleep 10
          status=$(curl -fsS -o /dev/null -w "%{http_code}" https://cqip.l-hay.workers.dev/login)
          echo "GET /login → $status"
          if [ "$status" != "200" ]; then
            echo "Smoke check failed: expected 200, got $status"
            exit 1
          fi
