#:schema node_modules/wrangler/config-schema.json

# Cloudflare Workers + Assets. @opennextjs/cloudflare produces a Worker
# entry at .open-next/worker.js plus static assets under .open-next/assets.
name = "cqip"
main = ".open-next/worker.js"

# nodejs_compat requires a compat date of 2024-09-23 or later.
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = true
